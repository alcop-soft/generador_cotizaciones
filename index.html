<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotización ALCOP</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
    :root {
        --bg: #eef2f6;
        --panel: #ffffff;
        --ink: #1f2937;
        --ink-soft: #475467;
        --line: #d0d5dd;
        --brand: #263548;
        --brand-strong: #1b2735;
        --ok: #1f7a4d;
        --ok-strong: #18603d;
        --danger: #b42318;
        --danger-strong: #912018;
    }

    body {
        background: radial-gradient(circle at top right, #f7fafc 0%, var(--bg) 55%, #e8edf3 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--ink);
    }

    .app-card {
        border: 1px solid var(--line);
        box-shadow: 0 10px 30px rgba(16, 24, 40, 0.08);
        border-radius: 12px;
        overflow: hidden;
    }

    .app-card .card-header {
        background: linear-gradient(120deg, var(--brand), #314863);
        color: #fff;
        border-bottom: none;
    }

    .cotizacion-container {
        background: var(--panel);
        padding: 36px;
        max-width: 940px;
        margin: 28px auto 40px;
        border: 1px solid var(--line);
        border-left: 6px solid var(--brand);
        box-shadow: 0 8px 20px rgba(16, 24, 40, 0.08);
        border-radius: 12px;
        position: relative;
    }

    .logo {
        max-height: 78px;
        width: auto;
    }

    .tabla-cotizacion th {
        background: #f8fafc;
        text-align: center;
        font-weight: 650;
        color: var(--brand);
        border-bottom: 2px solid var(--line);
    }

    .tabla-cotizacion td {
        vertical-align: middle;
        border-bottom: 1px solid #e9edf3;
    }

    .total-box {
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--brand-strong);
        border-top: 2px solid var(--line);
        padding-top: 12px;
    }

    .btn {
        transition: background-color .2s ease, border-color .2s ease;
    }

    .btn-primary {
        background-color: var(--brand);
        border-color: var(--brand);
    }

    .btn-primary:hover,
    .btn-primary:focus {
        background-color: var(--brand-strong);
        border-color: var(--brand-strong);
    }

    .btn-success {
        background-color: var(--ok);
        border-color: var(--ok);
    }

    .btn-success:hover,
    .btn-success:focus {
        background-color: var(--ok-strong);
        border-color: var(--ok-strong);
    }

    .btn-danger {
        background-color: var(--danger);
        border-color: var(--danger);
    }

    .btn-danger:hover,
    .btn-danger:focus {
        background-color: var(--danger-strong);
        border-color: var(--danger-strong);
    }

    .form-control:focus,
    .form-select:focus {
        border-color: #98a2b3;
        box-shadow: 0 0 0 0.2rem rgba(52, 64, 84, 0.12);
    }

    .producto-img {
        max-width: 110px;
        max-height: 110px;
        object-fit: cover;
        border-radius: 6px;
        border: 1px solid var(--line);
    }

    .descuento-section {
        display: none;
        justify-content: space-between;
    }

    .descuento-section.visible {
        display: flex;
    }

    .lineas-decorativas {
        display: none;
        pointer-events: none;
    }

    .linea {
        width: 7px;
        border-radius: 999px;
        box-shadow: 0 2px 5px rgba(15, 23, 42, 0.18);
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }

    .linea-1 { height: 54px; }
    .linea-2 { height: 82px; }
    .linea-3 { height: 122px; }
    .linea-4 { height: 72px; }
    .linea-5 { height: 142px; }
    .linea-6 { height: 102px; }

    .linea-1, .linea-4 { background: #1e3a8a; }
    .linea-2, .linea-5 { background: #dc2626; }
    .linea-3, .linea-6 { background: #f59e0b; }

    @media (max-width: 768px) {
        .cotizacion-container {
            margin: 18px 12px 24px;
            padding: 20px;
        }

        .logo {
            max-height: 56px;
        }
    }

    @media print {
        * {
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        html, body {
            background: #fff !important;
        }

        .no-print {
            display: none !important;
        }

        body {
            background: #fff;
            color: #111827;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .cotizacion-container {
            margin: 0;
            max-width: 100%;
            box-shadow: none;
            border: none;
            border-radius: 0;
            padding-left: 88px;
        }

        .tabla-cotizacion th:last-child,
        .tabla-cotizacion td:last-child {
            display: none;
        }

        .descuento-section {
            display: none !important;
        }

        .descuento-section.visible {
            display: flex !important;
        }

        .lineas-decorativas {
            display: flex !important;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-start;
            position: absolute;
            left: 22px;
            top: 8px;
            bottom: 8px;
            width: 34px;
        }

        .lineas-decorativas .linea-1 { margin-left: 0; }
        .lineas-decorativas .linea-2 { margin-left: 24px; }
        .lineas-decorativas .linea-3 { margin-left: 10px; }
        .lineas-decorativas .linea-4 { margin-left: 0; }
        .lineas-decorativas .linea-5 { margin-left: 24px; }
        .lineas-decorativas .linea-6 { margin-left: 10px; }

        .lineas-decorativas .linea-1,
        .lineas-decorativas .linea-4 {
            background-color: #1e3a8a !important;
        }

        .lineas-decorativas .linea-2,
        .lineas-decorativas .linea-5 {
            background-color: #dc2626 !important;
        }

        .lineas-decorativas .linea-3,
        .lineas-decorativas .linea-6 {
            background-color: #f59e0b !important;
        }

        .tabla-cotizacion th {
            background-color: #f1f5f9 !important;
            color: #1f2937 !important;
        }
    }
</style>
</head>
<body>

<div class="container no-print mt-4">
    <div class="card app-card">
        <div class="card-header">
            <h5 class="mb-0"><i class="bi bi-file-earmark-text"></i> Generador de Cotización</h5>
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Género</label>
                    <select id="genero" class="form-select">
                        <option value="Señor">Señor</option>
                        <option value="Señora">Señora</option>
                        <option value="Señores">Señores</option>
                        <option value="Arquitecto">Arquitecto</option>
                        <option value="Arquitecta">Arquitecta</option>
                        <option value="Ingeniero">Ingeniero</option>
                        <option value="Ingeniera">Ingeniera</option>
                        <option value="Interiorista">Interiorista</option>
                        <option value="Doctor">Doctor</option>
                        <option value="Doctora">Doctora</option>
                    </select>
                </div>
                <div class="col-md-8">
                    <label class="form-label fw-bold">Nombre del cliente</label>
                    <input type="text" id="cliente" class="form-control" placeholder="Ingrese el nombre del cliente">
                </div>
            </div>

            <hr class="my-4">

            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label fw-bold">Producto</label>
                    <input type="text" id="producto" class="form-control" placeholder="Descripción del producto">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold">Cantidad</label>
                    <input type="number" id="cantidad" class="form-control" placeholder="0" min="1">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold">Precio unitario</label>
                    <input type="number" id="precio" class="form-control" placeholder="0" min="1">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Imagen del producto</label>
                    <input type="file" id="imagenProducto" class="form-control" accept="image/*">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button id="agregarProducto" class="btn btn-success w-100">
                        <i class="bi bi-plus-circle"></i> Agregar
                    </button>
                </div>
            </div>

            <hr class="my-4">

            <div class="row g-3">
                <div class="col-md-12">
                    <button id="agregarTabla" class="btn btn-primary w-100">
                        <i class="bi bi-table"></i> Agregar nueva opción
                    </button>
                </div>
            </div>

            <hr class="my-4">

            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Nombre del vendedor</label>
                    <input type="text" id="vendedor" class="form-control" placeholder="Ingrese el nombre del vendedor">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Descuento general (%)</label>
                    <div class="input-group">
                        <input type="number" id="descuentoGeneral" class="form-control" placeholder="0" min="0" max="100">
                        <button id="aplicarDescuento" class="btn btn-outline-secondary">Aplicar</button>
                    </div>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button id="generarPDF" class="btn btn-primary w-100">
                        <i class="bi bi-download"></i> Exportar PDF
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="cotizacion-container">
    <div class="lineas-decorativas">
        <span class="linea linea-1"></span>
        <span class="linea linea-2"></span>
        <span class="linea linea-3"></span>
        <span class="linea linea-4"></span>
        <span class="linea linea-5"></span>
        <span class="linea linea-6"></span>
    </div>

    <div class="d-flex justify-content-between align-items-center gap-3">
        <img id="logoPreview" class="logo" src="img/logoN.png" alt="ALCOP logo">
        <h6 id="fecha" class="mb-0"></h6>
    </div>

    <p class="mt-4 mb-2">
        <span id="saludoGenero">Señor:</span><br>
        <strong id="nombreCliente"></strong>
    </p>

    <p class="mb-2">Cordial saludo,</p>

    <p>Para ALCOP es un agrado poner a su disposición la siguiente cotización:</p>

    <table class="table table-bordered tabla-cotizacion mt-4">
        <thead>
            <tr>
                <th>DESCRIPCIÓN</th>
                <th>CANTIDAD</th>
                <th>PRECIO UNITARIO</th>
                <th>SUBTOTAL</th>
                <th id="columnaImagen">IMAGEN</th>
                <th>ACCIONES</th>
            </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
    </table>

    <div class="row mt-4">
        <div class="col-md-6"></div>
        <div class="col-md-6">
            <div class="border rounded-2 p-3" id="totalesGenerales">
                <div class="d-flex justify-content-between mb-2">
                    <span>Subtotal:</span>
                    <span id="subtotal" class="fw-bold">$0</span>
                </div>
                <div id="descuentoSection" class="mb-2 descuento-section">
                    <span>Descuento:</span>
                    <span id="descuentoValor" class="fw-bold text-danger">$0</span>
                </div>
                <div class="d-flex justify-content-between total-box">
                    <span>Total general:</span>
                    <span id="totalGeneral">$0</span>
                </div>
            </div>
        </div>
    </div>

    <p class="mt-4 mb-2">En espera de su amable respuesta,</p>

    <p>
        Atentamente,<br>
        <span id="nombreVendedor">ALCOP.</span>
    </p>
</div>

<script src="cotizaciones.js"></script>
</body>
</html>
